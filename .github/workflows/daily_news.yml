name: Global Market Intelligence Bot

on:
  schedule:
    - cron: '0 13 * * *'  # Beijing 21:00 daily report
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-news-dashboard
  cancel-in-progress: false

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt PyNaCl

      - name: Restore dashboard bot state
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          DASHBOARD_ARCHIVE_BRANCH: ${{ vars.DASHBOARD_ARCHIVE_BRANCH || 'dashboard-archive' }}
          PORTFOLIO_PUBLIC_OUTPUTS: ${{ vars.PORTFOLIO_PUBLIC_OUTPUTS || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p outputs
          if ! git ls-remote --exit-code --heads origin "$DASHBOARD_ARCHIVE_BRANCH" >/dev/null 2>&1; then
            echo "No dashboard archive branch yet; starting with empty state."
            exit 0
          fi

          git fetch --depth=1 origin "$DASHBOARD_ARCHIVE_BRANCH"
          restore_state() {
            local filename="$1"
            if git show "FETCH_HEAD:state/${filename}" > "outputs/${filename}" 2>/dev/null; then
              echo "Restored ${filename}"
            else
              rm -f "outputs/${filename}"
            fi
          }

          restore_state watchlist.json
          restore_state event_history.json
          if [ "$PORTFOLIO_PUBLIC_OUTPUTS" = "true" ]; then
            restore_state decision_journal.json
            restore_state portfolio_history.json
            restore_state fixed_buy_pool_history.json
            restore_state fund_holdings_cache.json
          else
            echo "Private portfolio mode; not restoring portfolio state from the public archive branch."
          fi

      - name: Run news bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIPT_CHAT_ID: ${{ secrets.FEISHU_RECEIPT_CHAT_ID }}
          FEISHU_RECEIPT_CHAT_NAME: ${{ secrets.FEISHU_RECEIPT_CHAT_NAME || vars.FEISHU_RECEIPT_CHAT_NAME }}
          FEISHU_RECEIPT_LOOKBACK_HOURS: ${{ vars.FEISHU_RECEIPT_LOOKBACK_HOURS || '48' }}
          PORTFOLIO_YAML_B64: ${{ secrets.PORTFOLIO_YAML_B64 }}
          TRADE_LEDGER_YAML_B64: ${{ secrets.TRADE_LEDGER_YAML_B64 }}
          PORTFOLIO_PUBLIC_OUTPUTS: ${{ vars.PORTFOLIO_PUBLIC_OUTPUTS || 'false' }}
          NEWS_BASE_URL: ${{ vars.NEWS_BASE_URL }}
          NEWS_MODEL: ${{ vars.NEWS_MODEL }}
          NEWS_FALLBACK_MODELS: ${{ vars.NEWS_FALLBACK_MODELS }}
          NEWS_TIMEOUT: ${{ vars.NEWS_TIMEOUT }}
          TOP_EVENTS: ${{ vars.TOP_EVENTS }}
          PER_SOURCE_LIMIT: ${{ vars.PER_SOURCE_LIMIT }}
          API_SOURCE_LIMIT: ${{ vars.API_SOURCE_LIMIT }}
          FINNHUB_NEWS_CATEGORIES: ${{ vars.FINNHUB_NEWS_CATEGORIES }}
          DASHBOARD_PUBLIC_URL: ${{ vars.DASHBOARD_PUBLIC_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: |
          set -euo pipefail

          export NEWS_BASE_URL="${NEWS_BASE_URL:-https://api.edgefn.net/v1}"
          export NEWS_MODEL="${NEWS_MODEL:-MiniMax-M2.5}"
          export NEWS_FALLBACK_MODELS="${NEWS_FALLBACK_MODELS:-DeepSeek-V3.2}"
          export NEWS_TIMEOUT="${NEWS_TIMEOUT:-120}"
          export TOP_EVENTS="${TOP_EVENTS:-6}"
          export PER_SOURCE_LIMIT="${PER_SOURCE_LIMIT:-8}"
          export API_SOURCE_LIMIT="${API_SOURCE_LIMIT:-12}"
          export FINNHUB_NEWS_CATEGORIES="${FINNHUB_NEWS_CATEGORIES:-general,forex,crypto,merger}"
          export DASHBOARD_PUBLIC_URL="${DASHBOARD_PUBLIC_URL:-}"

          RUN_STAMP="$(TZ=Asia/Shanghai date +%Y-%m-%d-%H%M%S)"
          export DASHBOARD_ARCHIVE_PATH="runs/${RUN_STAMP}-run-${GITHUB_RUN_NUMBER}-attempt-${GITHUB_RUN_ATTEMPT}"
          export DASHBOARD_ARCHIVE_URL=""
          export DASHBOARD_ARCHIVE_INDEX_URL=""
          if [ -n "$DASHBOARD_PUBLIC_URL" ]; then
            export DASHBOARD_ARCHIVE_URL="${DASHBOARD_PUBLIC_URL%/}/${DASHBOARD_ARCHIVE_PATH}/"
            export DASHBOARD_ARCHIVE_INDEX_URL="${DASHBOARD_PUBLIC_URL%/}/archive.html"
          fi
          {
            echo "DASHBOARD_ARCHIVE_PATH=$DASHBOARD_ARCHIVE_PATH"
            echo "DASHBOARD_ARCHIVE_URL=$DASHBOARD_ARCHIVE_URL"
            echo "DASHBOARD_ARCHIVE_INDEX_URL=$DASHBOARD_ARCHIVE_INDEX_URL"
          } >> "$GITHUB_ENV"

          mkdir -p outputs
          rm -f outputs/dashboard.html outputs/report.md outputs/report.json outputs/portfolio_brief.md outputs/portfolio_weekly.md
          export PORTFOLIO_PUBLIC_OUTPUTS="${PORTFOLIO_PUBLIC_OUTPUTS:-false}"
          echo "TRADE_LEDGER_UPDATED=false" >> "$GITHUB_ENV"

          if [ -n "${PORTFOLIO_YAML_B64:-}" ]; then
            mkdir -p config
            printf '%s' "$PORTFOLIO_YAML_B64" | base64 -d > config/portfolio.yaml
            chmod 600 config/portfolio.yaml
            echo "Portfolio config loaded from GitHub Secret."
          fi
          if [ -n "${TRADE_LEDGER_YAML_B64:-}" ]; then
            mkdir -p config
            printf '%s' "$TRADE_LEDGER_YAML_B64" | base64 -d > config/trade_ledger.yaml
            chmod 600 config/trade_ledger.yaml
            echo "Trade ledger loaded from GitHub Secret."
          fi

          if [ -n "${FEISHU_APP_ID:-}" ] && [ -n "${FEISHU_APP_SECRET:-}" ] && { [ -n "${FEISHU_RECEIPT_CHAT_ID:-}" ] || [ -n "${FEISHU_RECEIPT_CHAT_NAME:-}" ]; }; then
            echo "Polling Feishu chat for trade receipts before building the report."
            (
              cd src
              python -m daily_news_bot.feishu_receipts \
                --ledger ../config/trade_ledger.yaml \
                --summary-output ../outputs/feishu_receipts.json \
                --soft-fail
            )
            appended_count="$(
              python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("outputs/feishu_receipts.json")
          if not path.exists():
              print(0)
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              print(int(payload.get("appended_count") or 0))
          PY
            )"
            if [ "$appended_count" -gt 0 ]; then
              echo "TRADE_LEDGER_UPDATED=true" >> "$GITHUB_ENV"
              echo "Appended ${appended_count} Feishu trade receipt(s)."
            else
              echo "No new Feishu trade receipts appended."
            fi
          else
            echo "Feishu receipt polling is not configured; skipping."
          fi

          MODE="evening"
          HOURS="24"
          EXTRA_ARGS=()
          BJT_WEEKDAY="$(TZ=Asia/Shanghai date +%u)"
          if [ "$BJT_WEEKDAY" = "7" ]; then
            EXTRA_ARGS+=(--weekly-review)
          fi

          python daily_news_bot.py \
            --mode "$MODE" \
            --hours "$HOURS" \
            --top "$TOP_EVENTS" \
            --per-source-limit "$PER_SOURCE_LIMIT" \
            --output "outputs/report.md" \
            --json-output "outputs/report.json" \
            --portfolio-output "outputs/portfolio_brief.md" \
            --weekly-review-output "outputs/portfolio_weekly.md" \
            "${EXTRA_ARGS[@]}" \
            --send-feishu

      - name: Update trade ledger secret from Feishu receipts
        if: env.TRADE_LEDGER_UPDATED == 'true'
        env:
          GH_TOKEN_FOR_SECRETS: ${{ secrets.SECRET_WRITE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          from nacl import encoding, public

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN_FOR_SECRETS"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "daily-news-bot-feishu-receipt-poll",
          }

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              key_payload = json.loads(response.read().decode("utf-8"))

          public_key = public.PublicKey(key_payload["key"].encode("utf-8"), encoding.Base64Encoder())
          sealed_box = public.SealedBox(public_key)
          raw = open("config/trade_ledger.yaml", "rb").read()
          secret_value = base64.b64encode(raw).decode("ascii")
          encrypted_value = base64.b64encode(sealed_box.encrypt(secret_value.encode("utf-8"))).decode("utf-8")

          body = json.dumps({"encrypted_value": encrypted_value, "key_id": key_payload["key_id"]}).encode("utf-8")
          update = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/secrets/TRADE_LEDGER_YAML_B64",
              data=body,
              method="PUT",
              headers={**headers, "Content-Type": "application/json"},
          )
          with urllib.request.urlopen(update, timeout=30) as response:
              if response.status not in (201, 204):
                  raise RuntimeError(f"Unexpected secret update status: {response.status}")
          PY

      - name: Upload dashboard run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-dashboard-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            outputs/dashboard.html
            outputs/report.md
            outputs/report.json
            outputs/watchlist.json
            outputs/portfolio_brief.md
            outputs/portfolio_weekly.md
          if-no-files-found: error
          retention-days: 90

      - name: Prepare and persist dashboard site
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.DASHBOARD_PUBLISH_PAGES != 'false'
        env:
          DASHBOARD_ARCHIVE_BRANCH: ${{ vars.DASHBOARD_ARCHIVE_BRANCH || 'dashboard-archive' }}
          GITHUB_TOKEN: ${{ github.token }}
          PORTFOLIO_PUBLIC_OUTPUTS: ${{ vars.PORTFOLIO_PUBLIC_OUTPUTS || 'false' }}
        run: |
          set -euo pipefail

          rm -rf public
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" "$DASHBOARD_ARCHIVE_BRANCH" >/dev/null 2>&1; then
            git clone --depth=1 --branch "$DASHBOARD_ARCHIVE_BRANCH" "https://github.com/${GITHUB_REPOSITORY}.git" public
          else
            mkdir -p public
            git -C public init
            git -C public checkout -B "$DASHBOARD_ARCHIVE_BRANCH"
            git -C public remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          copy_if_exists() {
            local src="$1"
            local dst="$2"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
            fi
          }

          mkdir -p "public/$DASHBOARD_ARCHIVE_PATH"
          touch public/.nojekyll

          copy_if_exists outputs/dashboard.html public/index.html
          copy_if_exists outputs/dashboard.html public/dashboard.html
          copy_if_exists outputs/report.md public/report.md
          copy_if_exists outputs/report.json public/report.json
          copy_if_exists outputs/watchlist.json public/watchlist.json

          mkdir -p public/state
          copy_if_exists outputs/watchlist.json public/state/watchlist.json
          copy_if_exists outputs/event_history.json public/state/event_history.json

          copy_if_exists outputs/dashboard.html "public/$DASHBOARD_ARCHIVE_PATH/index.html"
          copy_if_exists outputs/dashboard.html "public/$DASHBOARD_ARCHIVE_PATH/dashboard.html"
          copy_if_exists outputs/report.md "public/$DASHBOARD_ARCHIVE_PATH/report.md"
          copy_if_exists outputs/report.json "public/$DASHBOARD_ARCHIVE_PATH/report.json"
          copy_if_exists outputs/watchlist.json "public/$DASHBOARD_ARCHIVE_PATH/watchlist.json"

          if [ "$PORTFOLIO_PUBLIC_OUTPUTS" = "true" ]; then
            copy_if_exists outputs/portfolio_brief.md public/portfolio_brief.md
            copy_if_exists outputs/portfolio_weekly.md public/portfolio_weekly.md
            copy_if_exists outputs/decision_journal.json public/state/decision_journal.json
            copy_if_exists outputs/portfolio_history.json public/state/portfolio_history.json
            copy_if_exists outputs/fixed_buy_pool_history.json public/state/fixed_buy_pool_history.json
            copy_if_exists outputs/fund_holdings_cache.json public/state/fund_holdings_cache.json
            copy_if_exists outputs/portfolio_brief.md "public/$DASHBOARD_ARCHIVE_PATH/portfolio_brief.md"
            copy_if_exists outputs/portfolio_weekly.md "public/$DASHBOARD_ARCHIVE_PATH/portfolio_weekly.md"
          else
            rm -f public/portfolio_brief.md public/portfolio_weekly.md
            rm -f public/state/decision_journal.json public/state/portfolio_history.json public/state/fixed_buy_pool_history.json public/state/fund_holdings_cache.json
            if [ -d public/runs ]; then
              find public/runs -type f \( -name 'portfolio_brief.md' -o -name 'portfolio_weekly.md' \) -delete
            fi
          fi

          mkdir -p public/runs
          run_count="$(find public/runs -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')"
          latest_slug="$(find public/runs -mindepth 1 -maxdepth 1 -type d | sort -r | head -n 1 | sed 's#^public/runs/##')"
          latest_block='<span class="muted">No historical runs yet.</span>'
          if [ -n "$latest_slug" ]; then
            latest_block="<a href=\"runs/${latest_slug}/\">${latest_slug}</a>"
          fi

          cat > public/archive.html <<HTML
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>日报历史归档</title>
            <style>
              :root { color-scheme: light; --bg:#f4f6f8; --panel:#fff; --text:#172033; --muted:#647083; --line:#dfe5ec; --soft:#edf1f5; --blue:#1f6feb; --green:#17803d; }
              * { box-sizing: border-box; }
              body { margin:0; font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.55; }
              .wrap { max-width:1120px; margin:0 auto; padding:28px 18px 42px; }
              header { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; flex-wrap:wrap; margin-bottom:18px; }
              h1 { margin:0; font-size:30px; letter-spacing:0; }
              .muted { color:var(--muted); }
              .actions { display:flex; flex-wrap:wrap; gap:10px; }
              .button { border:1px solid var(--line); background:#fff; color:var(--blue); border-radius:6px; padding:7px 11px; }
              .hero { background:#fff; border:1px solid var(--line); border-left:4px solid var(--blue); border-radius:8px; padding:16px; margin-bottom:14px; }
              .hero-title { font-weight:760; margin-bottom:4px; }
              .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin:16px 0; }
              .metric, .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
              .metric-title { color:var(--muted); font-size:12px; }
              .metric-value { font-size:24px; font-weight:760; margin-top:4px; }
              .run-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:14px; align-items:center; padding:13px 0; border-top:1px solid var(--soft); }
              .run-row:first-child { border-top:0; padding-top:0; }
              .run-id { font-weight:700; word-break:break-all; }
              .run-badge { display:inline-block; margin-right:8px; color:var(--green); background:#f0fdf4; border:1px solid #bbf7d0; border-radius:6px; padding:1px 6px; font-size:12px; }
              .run-files { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; font-size:13px; }
              a { color:var(--blue); text-decoration:none; }
              a:hover { text-decoration:underline; }
              @media (max-width:720px) { .run-row { grid-template-columns:1fr; } .run-files { justify-content:flex-start; } h1 { font-size:25px; } }
            </style>
          </head>
          <body>
            <div class="wrap">
              <header>
                <div>
                  <h1>Daily News Dashboard Archive</h1>
                  <div class="muted">每次日报都会保留一份独立快照；最新页永远在站点根目录。</div>
                </div>
                <div class="actions">
                  <a class="button" href="./">最新 Dashboard</a>
                  <a class="button" href="archive.json">archive.json</a>
                </div>
              </header>
              <section class="hero">
                <div class="hero-title">怎么用这个页面</div>
                <div class="muted">先打开最新 Dashboard 做今日判断；需要回看某一天时，再进对应运行快照。每个快照都保留 dashboard、Markdown、JSON 和提醒状态。</div>
              </section>
              <section class="summary">
                <div class="metric"><div class="metric-title">历史运行</div><div class="metric-value">${run_count}</div></div>
                <div class="metric"><div class="metric-title">最新归档</div><div class="metric-value" style="font-size:16px">${latest_block}</div></div>
              </section>
              <section class="panel">
          HTML
          find public/runs -mindepth 1 -maxdepth 1 -type d | sort -r | while read -r dir; do
            slug="${dir#public/runs/}"
            badge=""
            if [ "$slug" = "$latest_slug" ]; then
              badge="<span class=\"run-badge\">最新</span>"
            fi
            echo "<div class=\"run-row\"><div><div class=\"run-id\">${badge}<a href=\"runs/${slug}/\">${slug}</a></div><div class=\"muted\">保留本次 dashboard、Markdown 报告、结构化 JSON 和提醒状态</div></div><div class=\"run-files\"><a href=\"runs/${slug}/\">dashboard</a><a href=\"runs/${slug}/report.md\">report.md</a><a href=\"runs/${slug}/report.json\">report.json</a><a href=\"runs/${slug}/watchlist.json\">watchlist.json</a></div></div>"
          done >> public/archive.html
          cat >> public/archive.html <<'HTML'
              </section>
            </div>
          </body>
          </html>
          HTML
          cp public/archive.html public/runs/index.html

          {
            echo '['
            first=1
            find public/runs -mindepth 1 -maxdepth 1 -type d | sort -r | while read -r dir; do
              slug="${dir#public/runs/}"
              if [ "$first" -eq 0 ]; then
                echo ','
              fi
              first=0
              printf '  {"id":"%s","url":"runs/%s/","report":"runs/%s/report.md","json":"runs/%s/report.json","watchlist":"runs/%s/watchlist.json"}' "$slug" "$slug" "$slug" "$slug" "$slug"
            done
            echo
            echo ']'
          } > public/archive.json

          git -C public add .
          if git -C public diff --cached --quiet; then
            echo "No dashboard archive changes to commit."
          else
            git -C public commit -m "Update dashboard archive for run ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            git -C public push origin "HEAD:$DASHBOARD_ARCHIVE_BRANCH"
          fi

          rm -rf public/.git

      - name: Add dashboard run summary
        env:
          DASHBOARD_PUBLIC_URL: ${{ vars.DASHBOARD_PUBLIC_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: |
          {
            echo "## Daily news dashboard"
            echo "- Latest dashboard: ${DASHBOARD_PUBLIC_URL:-not configured}"
            echo "- Archive index: ${DASHBOARD_ARCHIVE_INDEX_URL:-not configured}"
            echo "- This run archive: ${DASHBOARD_ARCHIVE_URL:-not configured}"
            echo "- Run artifact: daily-news-dashboard-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "- Files: outputs/dashboard.html, outputs/report.md, outputs/report.json, outputs/watchlist.json"
            if [ -f outputs/feishu_receipts.json ]; then
              python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("outputs/feishu_receipts.json").read_text(encoding="utf-8"))
          if payload.get("ok"):
              print(f"- Feishu receipts: scanned {payload.get('message_count', 0)}, appended {payload.get('appended_count', 0)}, duplicates {payload.get('duplicate_count', 0)}, parse errors {payload.get('error_count', 0)}")
          elif payload.get("skipped"):
              print(f"- Feishu receipts: skipped ({payload.get('reason', 'not configured')})")
          else:
              print(f"- Feishu receipts: failed ({payload.get('error', 'unknown error')})")
          PY
            fi
            if [ -f outputs/portfolio_brief.md ]; then
              echo "- Portfolio brief: outputs/portfolio_brief.md"
            fi
            if [ -f outputs/portfolio_weekly.md ]; then
              echo "- Weekly review: outputs/portfolio_weekly.md"
            fi
            if [ "${{ vars.DASHBOARD_PUBLISH_PAGES }}" = "false" ]; then
              echo "- Pages publishing is disabled by DASHBOARD_PUBLISH_PAGES=false."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.DASHBOARD_PUBLISH_PAGES != 'false'
        uses: actions/configure-pages@v5

      - name: Upload dashboard site
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.DASHBOARD_PUBLISH_PAGES != 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  publish-dashboard:
    needs: run-news-bot
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.DASHBOARD_PUBLISH_PAGES != 'false'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed dashboard
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"

          curl --fail --location --retry 6 --retry-delay 10 --silent --show-error "$base/" --output /tmp/dashboard.html
          grep -qi '<html' /tmp/dashboard.html
          grep -qi 'decision-strip' /tmp/dashboard.html

          curl --fail --location --retry 6 --retry-delay 10 --silent --show-error "$base/report.md" --output /tmp/report.md
          test -s /tmp/report.md

          curl --fail --location --retry 6 --retry-delay 10 --silent --show-error "$base/report.json" --output /tmp/report.json
          python3 -m json.tool /tmp/report.json >/dev/null

          curl --fail --location --retry 6 --retry-delay 10 --silent --show-error "$base/watchlist.json" --output /tmp/watchlist.json
          python3 -m json.tool /tmp/watchlist.json >/dev/null

          curl --fail --location --retry 6 --retry-delay 10 --silent --show-error "$base/archive.html" --output /tmp/archive.html
          grep -qi 'Daily News Dashboard Archive' /tmp/archive.html
          grep -qi 'run-row' /tmp/archive.html

  notify-failure:
    needs:
      - run-news-bot
      - publish-dashboard
    if: always() && (needs.run-news-bot.result == 'failure' || needs.run-news-bot.result == 'cancelled' || needs.publish-dashboard.result == 'failure' || needs.publish-dashboard.result == 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Feishu on workflow failure
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NEWS_RESULT: ${{ needs.run-news-bot.result }}
          PUBLISH_RESULT: ${{ needs.publish-dashboard.result }}
        run: |
          set -euo pipefail
          if [ -z "${FEISHU_WEBHOOK_URL:-}" ]; then
            echo "FEISHU_WEBHOOK_URL is not configured; skipping failure notification."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          text = "\n".join([
              "Global Market Intelligence Bot failed.",
              f"Run: {os.environ['RUN_URL']}",
              f"run-news-bot: {os.environ['RUN_NEWS_RESULT']}",
              f"publish-dashboard: {os.environ['PUBLISH_RESULT']}",
          ])
          payload = {
              "msg_type": "post",
              "content": {
                  "post": {
                      "zh_cn": {
                          "title": "Daily news bot failure",
                          "content": [[{"tag": "text", "text": text}]],
                      }
                  }
              },
          }
          data = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              os.environ["FEISHU_WEBHOOK_URL"],
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              response.read()
          PY
